name: Sync PDF Data

on:
  schedule:
    # 毎日JST 9:00 (UTC 0:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Authenticate with Google Drive
        run: |
          cd scripts
          echo '${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GOOGLE_DRIVE_TOKEN }}' > token.json

      - name: Fetch PDFs and convert to SQL
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          cd scripts
          python3 fetch_from_drive.py "$FOLDER_ID" > sentences.json
          python3 json_to_sql.py sentences.json > import.sql

      - name: Upload to D1 via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute lounge-translation-db \
            --remote \
            --file=./scripts/import.sql

      - name: Cleanup
        if: always()
        run: |
          cd scripts
          rm -f credentials.json token.json
